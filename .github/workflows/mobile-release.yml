name: Mobile Release

on:
  push:
    tags:
      - "mobile-v*"

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      release_version: ${{ steps.version.outputs.release_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21

      - name: Verify mobile tag matches app version
        id: version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#mobile-v}"
          APP_VERSION="$(node -p "require('./apps/mobile/package.json').version")"

          if [ "$TAG_VERSION" != "$APP_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match apps/mobile/package.json version ($APP_VERSION)."
            exit 1
          fi

          echo "release_version=$TAG_VERSION" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type-check mobile app
        run: bun run --cwd apps/mobile type-check

      - name: Type-check API
        run: bun run --cwd apps/api type-check

  build-android:
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
    outputs:
      build_url: ${{ steps.parse.outputs.build_url }}
      apk_url: ${{ steps.parse.outputs.apk_url }}
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EXPO_PUBLIC_EAS_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_EAS_PROJECT_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21

      - name: Set up Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: bun
          expo-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Android APK
        working-directory: apps/mobile
        run: eas build --platform android --profile production-apk --non-interactive --json --wait > android-build.json

      - name: Capture Android build metadata
        id: parse
        working-directory: apps/mobile
        run: |
          BUILD_METADATA="$(node <<'NODE'
          const fs = require('fs');

          function readBuild(file) {
            const raw = fs.readFileSync(file, 'utf8').trim();
            if (!raw) {
              return null;
            }

            try {
              const data = JSON.parse(raw);
              return Array.isArray(data) ? data[0] : data;
            } catch {
              const entries = raw
                .split('\n')
                .map((line) => line.trim())
                .filter(Boolean)
                .map((line) => {
                  try {
                    return JSON.parse(line);
                  } catch {
                    return null;
                  }
                })
                .filter(Boolean);
              const lastEntry = entries.at(-1);
              return Array.isArray(lastEntry) ? lastEntry[0] : lastEntry;
            }
          }

          const build = readBuild('android-build.json');
          const buildUrl = build?.buildDetailsPageUrl || build?.artifacts?.buildUrl || '';
          const apkUrl =
            build?.artifacts?.applicationArchiveUrl ||
            build?.applicationArchiveUrl ||
            '';
          process.stdout.write(JSON.stringify({ buildUrl, apkUrl }));
          NODE
          )"
          BUILD_URL="$(printf '%s' "$BUILD_METADATA" | node -p "const data=JSON.parse(require('fs').readFileSync(0,'utf8')); data.buildUrl || ''")"
          APK_URL="$(printf '%s' "$BUILD_METADATA" | node -p "const data=JSON.parse(require('fs').readFileSync(0,'utf8')); data.apkUrl || ''")"
          if [ -z "$BUILD_URL" ]; then
            echo "Unable to determine Android build URL."
            exit 1
          fi
          if [ -z "$APK_URL" ]; then
            echo "Unable to determine Android APK URL."
            exit 1
          fi
          echo "build_url=$BUILD_URL" >> "$GITHUB_OUTPUT"
          echo "apk_url=$APK_URL" >> "$GITHUB_OUTPUT"

