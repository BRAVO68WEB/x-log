  release:
    runs-on: ubuntu-latest
    needs:
      - validate
      - build-android
      # - build-ios
    permissions:
      contents: write
    steps:
      - name: Create release notes
        run: |
          cat <<EOF > mobile-release-notes.md
          Mobile release ${{ needs.validate.outputs.release_version }}

          Commit: ${{ github.sha }}

          Android build details:
          ${{ needs.build-android.outputs.build_url }}
          EOF

      - name: Download Android APK
        env:
          APK_URL: ${{ needs.build-android.outputs.apk_url }}
        run: |
          APK_NAME="xlog-android-v${{ needs.validate.outputs.release_version }}.apk"
          curl -L "$APK_URL" -o "$APK_NAME"

      - name: Publish GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APK_NAME="xlog-android-v${{ needs.validate.outputs.release_version }}.apk"
          gh release create "${GITHUB_REF_NAME}" \
            --title "Mobile v${{ needs.validate.outputs.release_version }}" \
            --notes-file mobile-release-notes.md \
            "$APK_NAME#Android APK"
